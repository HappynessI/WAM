common:
  img_history_size: 1
  action_chunk_size: 8
  num_cameras: 3
  state_dim: 128
  action_state_dim: 128
  hand_points_dim: 12
  contact_point_dim: 4
  continuous_target_dim: 144
  contact_flag_dim: 2
  contact_2d_image_size: [320, 240]
  heatmap_enabled: true
  heatmap_channels: 4
  heatmap_size: [48, 64]
  heatmap_sigma: 1.5
  heatmap_horizon: 4

dataset:
  buf_path: /path/to/buffer
  buf_num_chunks: 512
  buf_chunk_size: 512
  epsd_len_thresh_low: 32
  epsd_len_thresh_high: 2048
  image_aspect_ratio: pad
  tokenizer_max_length: 1024

model:
  lang_adaptor: mlp2x_gelu
  img_adaptor: mlp2x_gelu
  state_adaptor: mlp3x_gelu
  lang_token_dim: 4096
  img_token_dim: 1152
  img_token_length: 729
  state_token_dim: 128
  rdt:
    hidden_size: 2048
    depth: 28
    num_heads: 32
    cond_pos_embed_type: multimodal
  noise_scheduler:
    type: ddpm
    num_train_timesteps: 1000
    num_inference_timesteps: 5
    beta_schedule: squaredcos_cap_v2
    prediction_type: sample
    clip_sample: False
  ema:
    update_after_step: 0
    inv_gamma: 1.0
    power: 0.75
    min_value: 0.0
    max_value: 0.9999
